<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Tasks</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:'Segoe UI',sans-serif;
  display:flex;
  background:#e8e8e8;
}

.sidebar{
  width:120px;
  background:#1a1a2e;
  text-align:center;
  padding-top:20px;
}

.brand{
  width:44px;
  height:44px;
  margin:0 auto 30px;
}

.brand img{
  width:100%;
  height:100%;
  border-radius:8px;
}

.sidebar a{
  display:block;
  padding:10px 0;
  color:#888;
  text-decoration:none;
  font-size:12px;
}

.sidebar a:hover{
  background:#333;
  color:#fff;
}

.active{color:#fff}

.logout{
  margin-top:180px;
  color:#666;
}

.logout:hover{color:#e74c3c}

.main{
  flex:1;
  position:relative;
}

.card{
  background:#fff;
  margin:20px;
  padding:20px;
  border-radius:10px;
}

.tag{
  display:inline-block;
  background:#1a1a2e;
  color:#fff;
  padding:6px 15px;
  border-radius:6px;
  font-size:13px;
}

.sub{
  font-size:12px;
  color:#aaa;
  margin:5px 0 20px;
}

.tc{
  background:#f7f7f7;
  padding:15px;
  border-radius:8px;
  margin-bottom:15px;
}

.tc h5{
  font-size:14px;
  margin-bottom:3px;
}

.tname{
  font-size:13px;
  color:#444;
}

.dl{
  font-size:11px;
  color:#999;
  margin:5px 0 10px;
}

.btn{
  width:100%;
  padding:8px;
  border:0;
  border-radius:6px;
  background:#3a86ff;
  color:#fff;
}

.green{
  background:#34c759;
}

.msg{
  margin-top:15px;
  font-size:13px;
}

.foot{
  position:absolute;
  bottom:20px;
  right:20px;
  font-size:10px;
  color:#bbb;
}
</style>
</head>

<body>

<div class="sidebar">

  <div class="brand">
    <img src="logo.png">
  </div>

  <a href="dashboard.html">Dashboard</a>
  <a href="notebooks.html">Virtual Notebooks</a>
  <a href="tasks.html" class="active">Tasks</a>
  <a href="profile.html">Profile</a>
  <a href="index.html" class="logout">Logout</a>

</div>

<div class="main">

  <div class="card">

    <div class="tag">TASKS</div>
    <p class="sub">Choose a task.</p>

    <div class="tc">
      <h5>Mathematics</h5>
      <p class="tname">Drill Sheet 2</p>
      <p class="dl">Deadline: April 9, 2026</p>
      <button class="btn">Take this activity</button>
    </div>

    <div class="tc">
      <h5>Science</h5>
      <p class="tname">Lab Activity 3</p>
      <p class="dl">Deadline: April 10, 2026</p>
      <button class="btn">Take this activity</button>
    </div>

    <div class="tc">
      <h5>ICT</h5>
      <p class="tname">Quarter Project</p>
      <p class="dl">Deadline: May 8, 2026</p>
      <button class="btn green" onclick="submitTask()">
        Submit
      </button>
    </div>

    <div class="tc">
      <h5>VE</h5>
      <p class="tname">Film Critique</p>
      <p class="dl">Deadline: April 22, 2026</p>
      <button class="btn">Play Video Clip</button>
    </div>

    <p class="msg" id="msg"></p>

  </div>

  <div class="foot">
    Student Name | Grade & Section
  </div>

</div>

<script>
var pending = 3;
var total = 4;

if(pending > 0){
  document.getElementById("msg").innerHTML =
  pending + " out of " + total + " tasks pending.";

  document.getElementById("msg").style.color =
  "#e74c3c";
}
else{
  document.getElementById("msg").innerHTML =
  "All tasks done!";
}

function submitTask(){
  alert("Submitted!");
}
</script>

</body>
</html>
